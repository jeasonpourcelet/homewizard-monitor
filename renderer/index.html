<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeWizard Monitor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Navigation latérale -->
      <aside class="sidebar">
        <div class="brand">
          <span class="logo">⚡</span>
          <span class="brand-name">HomeWizard<br /><small>Monitor</small></span>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-view="overview"><span>📊</span> Aperçu</button>
          <button class="nav-item" data-view="charts"><span>📈</span> Graphiques</button>
          <button class="nav-item" data-view="devices"><span>🔌</span> Appareils</button>
        </nav>
        <div class="sidebar-foot">
          <p id="updated" class="muted small">En attente…</p>
        </div>
      </aside>

      <!-- Zone principale -->
      <main class="content">
        <!-- ===== Aperçu ===== -->
        <section id="view-overview" class="view">
          <header class="view-head">
            <h1>Aperçu en temps réel</h1>
          </header>
          <div id="cards" class="cards-grid"></div>
        </section>

        <!-- ===== Graphique (instantané) ===== -->
        <section id="view-charts" class="view" hidden>
          <header class="view-head">
            <h1>Consommation en direct</h1>
            <select id="hist-device" class="select"></select>
          </header>
          <div class="chart-card">
            <canvas id="chart"></canvas>
          </div>
          <p class="muted small">
            Mesure en temps réel de l'appareil sélectionné (les ~6 dernières minutes).
          </p>
        </section>

        <!-- ===== Appareils ===== -->
        <section id="view-devices" class="view" hidden>
          <header class="view-head">
            <h1>Appareils &amp; réglages</h1>
          </header>
          <div class="devices-cols">
            <div class="col-main">
              <div class="panel">
                <div class="panel-head">
                  <h2>Appareils suivis</h2>
                  <button id="btn-discover" class="primary sm">🔍 Découvrir</button>
                </div>
                <p id="discover-status" class="muted small"></p>
                <div id="discovered" class="device-list"></div>
                <div id="selected-list" class="device-list"></div>
              </div>

              <div class="panel">
                <h3>Ajouter par adresse IP</h3>
                <div class="row">
                  <input id="manual-ip" class="input" placeholder="192.168.1.42" />
                  <button id="btn-add-ip" class="secondary">Tester &amp; ajouter</button>
                </div>
                <p id="manual-status" class="muted small"></p>
              </div>
            </div>

            <div class="col-side">
              <div class="panel">
                <h3>Indicateur barre des tâches</h3>
                <p class="muted small">La valeur affichée sur l'icône, comme un widget.</p>
                <label class="field">Appareil
                  <select id="tray-device" class="select wide"></select>
                </label>
                <label class="field">Donnée
                  <select id="tray-type" class="select wide">
                    <option value="off">Logo (rien)</option>
                    <option value="soc">% batterie</option>
                    <option value="power">Puissance</option>
                    <option value="flow">Débit eau</option>
                  </select>
                </label>
                <button id="btn-tray-save" class="secondary wide">Appliquer</button>
                <span id="tray-status" class="muted small"></span>
              </div>
              <button id="btn-save" class="primary wide">💾 Enregistrer les appareils</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
    <script src="app.js"></script>
  </body>
</html>
